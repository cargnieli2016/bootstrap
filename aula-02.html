<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 - Tabelas</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <h1>Aula 02 - Tabelas</h1><br />
        <h4>Tabela Striped</h4>

        <table class="table table-striped">
            <thead>
                <tr class="table-success">
                    <th>Nome do Curso</th>
                    <th class="text-center">Carga Horária</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bootstrap 5</td>
                    <td class="text-center">24hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Reacts</td>
                    <td class="text-center">24hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>JavaScript</td>
                    <td class="text-center">12hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Java 25</td>
                    <td class="text-center">42hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Full Stack</td>
                    <td class="text-center">360hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Reactive Native</td>
                    <td class="text-center">38hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <br />
        <h4>Tabela Hover</h4>
        <table class="table table-dark table-hover">
            <thead>
                <tr class="table-success">
                    <th>Nome do Curso</th>
                    <th>Carga Horária</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bootstrap 5</td>
                    <td>24hr</td>
                </tr>
                <tr>
                    <td>Reacts</td>
                    <td>24hr</td>
                </tr>
                <tr>
                    <td>JavaScript</td>
                    <td>12hr</td>
                </tr>
                <tr>
                    <td>Java 25</td>
                    <td>42hr</td>
                </tr>
                <tr>
                    <td>Full Stack</td>
                    <td>360hr</td>
                </tr>
                <tr>
                    <td>Reactive Native</td>
                    <td>38hr</td>
                </tr>
            </tbody>
        </table>

        <script src="js/bootstrap.bundle.min.js"></script>
    </div>
</body>

</html>
