<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 - Tabelas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h1>Aula 02 - Tabelas</h1><br />
        <h4>Tabela Striped</h4>

        <table class="table table-striped">
            <thead>
                <tr class="table-success">
                    <th>Nome do Curso</th>
                    <th class="text-center">Carga Horária</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bootstrap 5</td>
                    <td class="text-center">24hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Reacts</td>
                    <td class="text-center">24hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>JavaScript</td>
                    <td class="text-center">12hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Java 25</td>
                    <td class="text-center">42hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Full Stack</td>
                    <td class="text-center">360hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
                <tr>
                    <td>Reactive Native</td>
                    <td class="text-center">38hr</td>
                    <td class="text-end">
                        <button class="btn btn-primary">Detalhes</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <br />
        <h4>Tabela Hover</h4>
        <table class="table table-dark table-hover">
            <thead>
                <tr class="table-success">
                    <th>Nome do Curso</th>
                    <th>Carga Horária</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bootstrap 5</td>
                    <td>24hr</td>
                </tr>
                <tr>
                    <td>Reacts</td>
                    <td>24hr</td>
                </tr>
                <tr>
                    <td>JavaScript</td>
                    <td>12hr</td>
                </tr>
                <tr>
                    <td>Java 25</td>
                    <td>42hr</td>
                </tr>
                <tr>
                    <td>Full Stack</td>
                    <td>360hr</td>
                </tr>
                <tr>
                    <td>Reactive Native</td>
                    <td>38hr</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
